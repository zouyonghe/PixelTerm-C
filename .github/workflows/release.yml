name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-linux:
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
            container: archlinux:latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            container: menci/archlinuxarm:base-devel
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build on Linux (Arch)
      run: |
        mkdir -p release-${{ matrix.arch }}
        
        # Native build for Linux (amd64/arm64)
        echo "Native build for ${{ matrix.arch }}"
        
        # Install dependencies
        pacman-key --init
        if pacman -Si archlinuxarm-keyring >/dev/null 2>&1; then
          pacman-key --populate archlinuxarm
          pacman -Syu --noconfirm --needed archlinuxarm-keyring
        else
          pacman-key --populate archlinux
        pacman -Syu --noconfirm --needed --disable-sandbox archlinux-keyring
        fi
        deps=(base-devel pkgconf git glib2 gdk-pixbuf2 chafa ffmpeg mupdf mujs gumbo-parser)
        if pacman -Si libmupdf >/dev/null 2>&1; then
          deps+=(libmupdf)
        fi
        pacman -Syu --noconfirm --needed --disable-sandbox "${deps[@]}"
        
        # Build PixelTerm-C
        make clean && make
        if command -v strip >/dev/null; then
          strip bin/pixelterm || true
        fi
        cp bin/pixelterm release-${{ matrix.arch }}/pixelterm-${{ matrix.arch }}-linux

    - name: Create release package
      run: |
        mkdir -p release
        cp release-${{ matrix.arch }}/pixelterm-${{ matrix.arch }}-linux release/
        tar -czf release/pixelterm-${{ matrix.arch }}-linux.tar.gz -C release pixelterm-${{ matrix.arch }}-linux

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pixelterm-${{ matrix.arch }}-linux.tar.gz
        path: release/pixelterm-${{ matrix.arch }}-linux.tar.gz

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: pixelterm-${{ matrix.arch }}-linux
        path: release/pixelterm-${{ matrix.arch }}-linux

  build-macos:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runs-on: macos-15-intel
          - arch: arm64
            runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build on macOS
      run: |
        mkdir -p release-${{ matrix.arch }}
        
        # Install dependencies using Homebrew (only install packages not pre-installed)
        brew install pkg-config glib gdk-pixbuf chafa ffmpeg mupdf
        export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/share/pkgconfig"
        
        # Chafa is already installed by Homebrew, no need to build from source
        echo "Using Homebrew Chafa"
        
        # Build PixelTerm-C
        make clean && make
        if command -v strip >/dev/null; then
          strip bin/pixelterm || true
        fi
        cp bin/pixelterm release-${{ matrix.arch }}/pixelterm-${{ matrix.arch }}-macos

    - name: Create release package
      run: |
        mkdir -p release
        cp release-${{ matrix.arch }}/pixelterm-${{ matrix.arch }}-macos release/
        tar -czf release/pixelterm-${{ matrix.arch }}-macos.tar.gz -C release pixelterm-${{ matrix.arch }}-macos

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pixelterm-${{ matrix.arch }}-macos.tar.gz
        path: release/pixelterm-${{ matrix.arch }}-macos.tar.gz

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: pixelterm-${{ matrix.arch }}-macos
        path: release/pixelterm-${{ matrix.arch }}-macos

  create-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: pixelterm*
        merge-multiple: true

    - name: Prepare release notes inputs
      id: release_notes_inputs
      env:
        workflow_dispatch_version: ${{ github.event.inputs.version }}
        event_name: ${{ github.event_name }}
      run: |
        if [ "${event_name}" = "workflow_dispatch" ] && [ -z "${workflow_dispatch_version}" ]; then
          echo "workflow_dispatch version input is required for manual release-note generation" >&2
          exit 1
        fi

        if [ "${event_name}" = "workflow_dispatch" ] && [[ "${GITHUB_REF}" == refs/tags/* ]] && [ "${workflow_dispatch_version}" != "${GITHUB_REF_NAME}" ]; then
          echo "workflow_dispatch version input must match the tag ref being released" >&2
          exit 1
        fi

        current_tag="${workflow_dispatch_version:-$GITHUB_REF_NAME}"
        previous_tag=""
        output_file="${RUNNER_TEMP}/release-notes.md"
        : > "${output_file}"

        {
          echo "current_tag=${current_tag}"
          echo "previous_tag=${previous_tag}"
          echo "output_file=${output_file}"
        } >> "${GITHUB_OUTPUT}"

    - name: Generate release notes
      env:
        current_tag: ${{ steps.release_notes_inputs.outputs.current_tag }}
        previous_tag: ${{ steps.release_notes_inputs.outputs.previous_tag }}
        output_file: ${{ steps.release_notes_inputs.outputs.output_file }}
        RELEASE_NOTES_USE_GITHUB_API: "1"
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        args=(
          --current-tag "${current_tag}"
          --output "${output_file}"
          --repo .
        )

        if [ -n "${previous_tag}" ]; then
          args+=(--previous-tag "${previous_tag}")
        fi

        python3 scripts/generate_release_notes.py "${args[@]}"

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        body_path: ${{ steps.release_notes_inputs.outputs.output_file }}
        files: |
          pixelterm-amd64-linux.tar.gz
          pixelterm-amd64-linux
          pixelterm-arm64-linux.tar.gz
          pixelterm-arm64-linux
          pixelterm-amd64-macos.tar.gz
          pixelterm-amd64-macos
          pixelterm-arm64-macos.tar.gz
          pixelterm-arm64-macos

  sync-doc-versions:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Refresh main and sync tracked docs
      env:
        release_version: ${{ github.ref_name }}
        release_tag_sha: ${{ github.sha }}
      run: |
        set -euo pipefail

        tracked_files=(
          README.md
          docs/i18n/README_zh.md
          docs/i18n/README_ja.md
          docs/project/PROJECT_STATUS.md
          docs/project/ROADMAP.md
          docs/development/DEVELOPMENT.md
        )

        if ! [[ "${release_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Skipping docs sync for non-formal release tag ${release_version}."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        ensure_release_is_on_main() {
          if ! git merge-base --is-ancestor "${release_tag_sha}" origin/main; then
            echo "Tagged commit ${release_tag_sha} for ${release_version} is not contained in origin/main; refusing to update main docs." >&2
            exit 1
          fi
        }

        sync_main_docs() {
          local sync_status=0

          python3 scripts/sync_version_refs.py --check "${release_version}" || sync_status=$?

          if [ "${sync_status}" -eq 0 ]; then
            return 0
          fi

          if [ "${sync_status}" -ne 2 ]; then
            return "${sync_status}"
          fi

          python3 scripts/sync_version_refs.py "${release_version}"

          if git diff --quiet --exit-code -- "${tracked_files[@]}"; then
            return 0
          fi

          return 10
        }

        for attempt in 1 2 3; do
          git fetch origin main
          ensure_release_is_on_main
          git checkout -B main origin/main

          current_main_version="$(python3 scripts/sync_version_refs.py --current-version)"
          compare_result="$(python3 scripts/sync_version_refs.py "${release_version}" --compare-version "${current_main_version}")"

          if [ "${compare_result}" -lt 0 ]; then
            echo "Skipping docs sync for older release tag ${release_version}; origin/main already tracks ${current_main_version}."
            exit 0
          fi

          sync_result=0
          sync_main_docs || sync_result=$?

          case "${sync_result}" in
            0)
              echo "Tracked doc versions already match ${release_version} on origin/main."
              exit 0
              ;;
            10)
              git add "${tracked_files[@]}"
              git commit -m "docs: sync version references for ${release_version}"
              if git push origin HEAD:main; then
                echo "Pushed tracked doc version sync for ${release_version}."
                exit 0
              fi
              echo "Push failed after refresh attempt ${attempt}; retrying against latest origin/main." >&2
              ;;
            *)
              exit "${sync_result}"
              ;;
          esac
        done

        echo "Unable to push tracked doc version sync after refreshing origin/main." >&2
        exit 1
