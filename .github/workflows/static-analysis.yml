name: Static Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            -Iinclude -Isrc \
            src

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libchafa-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libavformat-dev \
            libavcodec-dev \
            libswscale-dev \
            libavutil-dev \
            libmupdf-dev

      - name: Validate MuPDF pkg-config metadata
        run: |
          pkg-config --modversion mupdf
          pkg-config --libs mupdf

      - name: Build with warnings as errors
        run: |
          make EXTRA_CFLAGS=-Werror

      - name: Run tests
        run: |
          make EXTRA_CFLAGS=-Werror test

      - name: Validate debug AddressSanitizer build
        run: |
          make debug

  build-and-test-macos:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install pkg-config glib gdk-pixbuf chafa ffmpeg mupdf
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/share/pkgconfig" >> "$GITHUB_ENV"

      - name: Build with warnings as errors
        run: |
          make EXTRA_CFLAGS=-Werror

      - name: Run tests
        run: |
          make EXTRA_CFLAGS=-Werror test

      - name: Validate debug AddressSanitizer build
        run: |
          make debug
